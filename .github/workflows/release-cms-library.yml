name: Release CMS Library

on:
  push:
    branches:
      - cms-package
    paths:
      - 'packages/cms-library/**'

jobs:
  release: 
    name: Publish @team14/cms-library
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with: 
          fetch-depth: 0
        
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
        
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CMS Library
        run: cd packages/cms-library && pnpm build

      - name: Publish to npm
        run: pnpm publish --filter=@team14/cms-library --no-git-checks --access public
        env: 
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}